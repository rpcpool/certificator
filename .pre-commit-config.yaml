repos:
- repo: local
  hooks:
  - id: gofmt
    name: gofmt
    entry: gofmt -w
    language: system
    files: \.go$
  - id: golangci-lint
    name: golangci-lint
    entry: golangci-lint run
    language: system
    files: \.go$
    pass_filenames: false
  - id: go-vet
    name: go-vet
    entry: go vet ./...
    language: system
    files: \.go$
    pass_filenames: false
