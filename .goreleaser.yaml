# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: certificator
    main: ./cmd/certificator
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
  - binary: certificatee
    main: ./cmd/certificatee
    id: certificatee
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64

archives:
  - formats: [tar.gz]
    # Use .Binary so each build produces a distinct archive name:
    # certificator_Linux_x86_64.tar.gz and certificatee_Linux_x86_64.tar.gz
    name_template: >-
      {{ .Binary }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
